<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👩‍🍳 Quản lý - Chủ quán / Bếp</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fcf8f5; margin: 0; padding: 0; color: #333; }
        header { background: #4e3629; color: white; padding: 15px 20px; text-align: center; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 16px; background: #e7a460; color: white; text-decoration: none; padding: 6px 14px; border-radius: 8px; font-weight: bold; }
        .revenue-bar { background: #fff; border-bottom: 2px solid #eddcd0; padding: 15px; text-align: center; }
        .money-large { color: #27ae60; font-size: 24px; font-weight: bold; }
        
        .admin-main-layout { display: flex; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .column-box { flex: 1; background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border-top: 5px solid #ccc; }
        
        .col-pending { border-top-color: #e67e22; }
        .col-cooking { border-top-color: #e7a460; }
        .col-waiting { border-top-color: #27ae60; }
        
        h2.column-title { margin-top: 0; font-size: 18px; color: #4e3629; border-bottom: 1px solid #f5ece5; padding-bottom: 10px; display: flex; justify-content: space-between; }
        
        .order-card { background: #fffdfb; border: 1px solid #eddcd0; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .order-card h4 { margin: 0 0 6px 0; font-size: 15px; color: #333; display: flex; justify-content: space-between; }
        .order-card ul { margin: 5px 0; padding-left: 18px; font-size: 13px; color: #555; }
        
        .btn-action { width: 100%; border: none; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; margin-top: 8px; color: white; }
        .btn-to-cooking { background: #e67e22; }
        .btn-to-waiting { background: #27ae60; }
        
        .badge-method { font-size: 11px; padding: 1px 4px; border-radius: 3px; font-weight: bold; color: white; margin-right: 4px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-back">⬅️ Ra ngoài</a>
        <h1>👩‍🍳 BẢNG ĐIỀU HÀNH BẾP & DOANH THU</h1>
    </header>

    <div class="revenue-bar">
        💥 Doanh thu hôm nay: <span id="today-revenue" class="money-large">0</span> <span style="font-weight: bold; color: #27ae60;">đ</span>
    </div>

    <main class="admin-main-layout">
        <section class="column-box col-pending">
            <h2 class="column-title">⏳ Chờ nấu <span id="count-pending" style="color:#e67e22">(0)</span></h2>
            <div id="list-pending"></div>
        </section>

        <section class="column-box col-cooking">
            <h2 class="column-title">🔥 Đang nấu <span id="count-cooking" style="color:#e7a460">(0)</span></h2>
            <div id="list-cooking"></div>
        </section>

        <section class="column-box col-waiting">
            <h2 class="column-title">✅ Đã xong món <span id="count-waiting" style="color:#27ae60">(0)</span></h2>
            <div id="list-waiting"></div>
        </section>
    </main>

    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-120.wav" preload="auto"></audio>

    <script>
        const SUPABASE_URL = "https://vfducmflkdlgwxvpiibv.supabase.co";
        // Đồng bộ Key sạch từ file order.html của bạn
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmZHVjbWZsa2RsZ3d4dnBpaWJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTY1MjMsImV4cCI6MjA5Njg5MjUyM30.mJ1xSHBeSQ1nDHUjPLc9GYA_RON0_bEIqpzTwYrjidM";

        const adminSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            global: { headers: { 'x-passcode': 'beut123' } }
        });

        const notifySound = document.getElementById('notification-sound');

        function getToday() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        async function loadData() {
            // Tải doanh thu
            try {
                const today = getToday();
                const { data: revData } = await adminSupabase.from('revenue').select('total').eq('date', today).maybeSingle();
                document.getElementById('today-revenue').innerText = (revData?.total || 0).toLocaleString();
            } catch (e) { console.error(e); }

            // Tải đơn hàng chưa thanh toán (khớp logic .neq('status', 'paid') bên order)
            const { data: orders, error } = await adminSupabase.from('orders').select('*').neq('status', 'paid');
            if (error) { console.error(error); return; }

            const pendingBox = document.getElementById('list-pending');
            const cookingBox = document.getElementById('list-cooking');
            const waitingBox = document.getElementById('list-waiting');

            let htmlPending = '', htmlCooking = '', htmlWaiting = '';
            let numP = 0, numC = 0, numW = 0;

            (orders || []).forEach(o => {
                let itemsList = '';
                if (Array.isArray(o.items)) {
                    itemsList = o.items.map(i => `<li>${i}</li>`).join('');
                } else {
                    itemsList = `<li>${o.items || ''}</li>`;
                }

                const itemsStr = Array.isArray(o.items) ? o.items.join(' ') : String(o.items || '');
                const isPaidAhead = (itemsStr.includes('CHUYỂN KHOẢN') || itemsStr.includes('TIỀN MẶT'));
                const paidBadge = isPaidAhead ? `<span class="badge-method" style="background:#27ae60">ĐÃ TRẢ TRƯỚC</span>` : `<span class="badge-method" style="background:#e67e22">TRẢ SAU</span>`;

                const cardHTML = `
                    <div class="order-card">
                        <h4>
                            <span>📍 Bàn: ${o.table_number}</span>
                            <span style="font-weight:bold; color:#e67e22;">${(o.total || 0).toLocaleString()}đ</span>
                        </h4>
                        <div style="margin-bottom: 6px;">${paidBadge}</div>
                        <ul style="list-style-type: circle;">${itemsList}</ul>
                        ${
                            o.status === 'pending' ? 
                            `<button class="btn-action btn-to-cooking" onclick="updateStatus('${o.id}', 'cooking')">🧑‍🍳 Nhận nấu đơn này</button>` :
                            o.status === 'cooking' ? 
                            `<button class="btn-action btn-to-waiting" onclick="updateStatus('${o.id}', 'done')">🔔 Báo xong - Gửi Phục Vụ</button>` : 
                            `<p style="margin:5px 0 0 0; font-size:12px; color:#27ae60; font-weight:bold; text-align:center;">⌛ Đang chờ phục vụ bưng lên...</p>
                             <button class="btn-action" style="background:#888;" onclick="payTable('${o.table_number}', ${o.total})">💵 Thu tiền & Đóng đơn</button>`
                        }
                    </div>
                `;

                let currentStatus = String(o.status || '').toLowerCase().trim();
                if (currentStatus === 'pending') {
                    htmlPending += cardHTML; numP++;
                } else if (currentStatus === 'cooking') {
                    htmlCooking += cardHTML; numC++;
                } else if (currentStatus === 'done') {
                    htmlWaiting += cardHTML; numW++;
                }
            });

            pendingBox.innerHTML = htmlPending || '<p style="text-align:center;color:#999;font-size:13px;">Hết đơn chờ.</p>';
            cookingBox.innerHTML = htmlCooking || '<p style="text-align:center;color:#999;font-size:13px;">Bếp đang trống.</p>';
            waitingBox.innerHTML = htmlWaiting || '<p style="text-align:center;color:#999;font-size:13px;">Không có món đợi bưng.</p>';

            document.getElementById('count-pending').innerText = `(${numP})`;
            document.getElementById('count-cooking').innerText = `(${numC})`;
            document.getElementById('count-waiting').innerText = `(${numW})`;
        }

        async function updateStatus(id, nextStatus) {
            const { error } = await adminSupabase.from('orders').update({ status: nextStatus }).eq('id', parseInt(id));
            if (error) { 
                alert("Lỗi cập nhật trạng thái đơn: " + error.message); 
            } else { 
                loadData(); 
            }
        }

        async function payTable(table, amount) {
            if(!confirm("Thu tiền bàn " + table + "? Đơn sẽ được lưu doanh thu và hoàn tất.")) return;
            
            const { error: orderError } = await adminSupabase.from('orders').update({ status: 'paid' }).eq('table_number', table).neq('status', 'paid');
            if (orderError) {
                alert("Lỗi cập nhật đơn: " + orderError.message);
                return;
            }
            
            const todayDate = getToday();
            const { data: rev } = await adminSupabase.from('revenue').select('total').eq('date', todayDate).maybeSingle();
            const newTotal = (rev?.total || 0) + amount;
            
            const { error: revError } = await adminSupabase.from('revenue').upsert({ date: todayDate, total: newTotal }, { onConflict: 'date' });
            if (revError) {
                alert("Lỗi lưu doanh thu: " + revError.message);
            }
            
            loadData();
        }

        adminSupabase.channel('admin-legacy-fixed-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, (payload) => {
                if (payload.eventType === 'INSERT') {
                    if (notifySound) {
                        notifySound.play().catch(e => console.log("Autoplay block: " + e.message));
                    }
                }
                loadData();
            })
            .subscribe();

        window.onload = loadData;
    </script>
</body>
</html>
