<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ COFFEE POS - Hệ Thống Điều Hướng</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5ece5 0%, #e0d7cf 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .portal-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(78, 54, 41, 0.15);
            max-width: 450px;
            width: 90%;
        }
        h1 {
            color: #4e3629;
            margin-bottom: 10px;
            font-size: 26px;
        }
        p {
            color: #777;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .portal-btn {
            display: block;
            text-decoration: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn-order {
            background-color: #e7a460;
            color: white;
        }
        .btn-order:hover {
            background-color: #d68f4b;
            transform: translateY(-2px);
        }
        .btn-kitchen {
            background-color: #2c3e50;
            color: white;
        }
        .btn-kitchen:hover {
            background-color: #1a252f;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="portal-container">
        <h1>☕ COFFEE Mono System</h1>
        <p>Vui lòng chọn vai trò làm việc của bạn để tiếp tục</p>
        
        <div class="btn-group">
            <a href="order.html" class="portal-btn btn-order">📱 Giao diện PHỤC VỤ (Gọi Món)</a>
            
            <a href="admin.html" class="portal-btn btn-kitchen">👨‍🍳 Giao diện Bếp (Nhận Đơn)</a>
        </div>
    </div>
Bếp
</body>
</html>
